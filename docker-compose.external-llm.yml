# Override : branche l'app sur le service Ollama CENTRAL (repo llm-service)
# au lieu de lancer l'Ollama local.
#
#   Autonome (Ollama local embarqué) :
#     docker compose up -d --build
#   Branché sur le service central (llm-service doit tourner) :
#     docker compose -f docker-compose.yml -f docker-compose.external-llm.yml up -d --build
#
# Prérequis : `make up` dans llm-service (Ollama central + réseau « llm-net »).
#
# Modèles (codés dans python/streamlit_app.py) : "gemma4:e4b" (chat) et
# "nomic-embed-text:latest" (embeddings) — tous deux provisionnés par défaut
# côté central (PRELOAD_MODELS), donc rien à ajouter.
services:
  # 1. Neutralise l'Ollama local.
  ollama:
    deploy:
      replicas: 0

  # 2. L'app pointe vers le central (via OLLAMA_HOST) + rejoint llm-net.
  rag-python:
    environment:
      OLLAMA_HOST: http://ollama-central:11434
    # Retire la dépendance à l'ollama local ; garde la base pgvector.
    depends_on: !reset
      db:
        condition: service_healthy
    networks:
      - app-network
      - llm-net

networks:
  llm-net:
    external: true
