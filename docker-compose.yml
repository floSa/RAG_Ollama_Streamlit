# Supprimez la ligne 'version: '3.9'' car elle est obsolète
# version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-*}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-true}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-false}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "ollama", "list"] # C'est déjà correct, juste pour confirmation
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: ["sh", "/entrypoint.sh"]

  db:
    image: pgvector/pgvector:pg15
    container_name: pgvector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"] # Correction ici : ajouter CMD-SHELL
      interval: 10s
      timeout: 5s
      retries: 5

  rag-python:
    build: ./python  # Utiliser le Dockerfile
    container_name: rag-python
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=rag_db
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "0.0.0.0:8501:8501"
      - "0.0.0.0:8888:8888"

volumes:
  pgdata:
  ollama_data:

networks:
  app-network: