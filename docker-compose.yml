# Supprimez la ligne 'version: '3.9'' car elle est obsolète
# version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: unless-stopped
    env_file:
      - .env
    # environment:
    #   - OLLAMA_HOST=... (Managed by .env)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "ollama", "list" ] # C'est déjà correct, juste pour confirmation
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    entrypoint: [ "sh", "/entrypoint.sh" ]

  db:
    image: pgvector/pgvector:pg15
    container_name: pgvector-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ] # Correction ici : ajouter CMD-SHELL
      interval: 10s
      timeout: 5s
      retries: 5

  rag-python:
    build: ./python # Utiliser le Dockerfile
    container_name: rag-python
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "0.0.0.0:8502:8501"
      - "0.0.0.0:8888:8888"

volumes:
  pgdata:
  ollama_data:


networks:
  app-network:
